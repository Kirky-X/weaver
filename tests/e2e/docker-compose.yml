# E2E Test Environment Docker Compose.
# Provides isolated Docker services for E2E testing, separate from
# the development docker-compose configuration. Uses dedicated ports to
# avoid conflicts with local development.

version: "3.8"

services:
  postgres_e2e:
    image: pgvector/pgvector:pg16
    container_name: weaver_e2e_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: weaver_e2e
    ports:
      - "5433:5432"
    volumes:
      - postgres_e2e_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d weaver_e2e"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - weaver_e2e_network

  neo4j_e2e:
    image: neo4j:5.25
    container_name: weaver_e2e_neo4j
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1g
      NEO4J_dbms_memory_pagecache_size: 512m
    ports:
      - "7475:7474"
      - "7688:7687"
    volumes:
      - neo4j_e2e_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks:
      - weaver_e2e_network

  redis_e2e:
    image: redis:7-alpine
    container_name: weaver_e2e_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_e2e_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - weaver_e2e_network

volumes:
  postgres_e2e_data:
  neo4j_e2e_data:
  redis_e2e_data:

networks:
  weaver_e2e_network:
    driver: bridge
