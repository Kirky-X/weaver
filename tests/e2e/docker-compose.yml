# Weaver Docker Compose.
# Provides Docker services for integration testing and development.
# Uses dedicated ports to avoid conflicts with local development.

name: weaver

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: weaver_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: weaver
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d weaver"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - weaver_network

  neo4j:
    image: neo4j:5.25
    container_name: weaver_neo4j
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1g
      NEO4J_dbms_memory_pagecache_size: 512m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks:
      - weaver_network

  redis:
    image: redis:7-alpine
    container_name: weaver_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - weaver_network

volumes:
  postgres_data:
  neo4j_data:
  redis_data:

networks:
  weaver_network:
    driver: bridge
