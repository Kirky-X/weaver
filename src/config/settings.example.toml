# News Discovery — Configuration Template
# Copy this file to settings.toml and fill in your values.

[app]
app_name = "news-discovery"
debug = false

[postgres]
dsn = "postgresql+asyncpg://user:password@localhost:5432/news_discovery"

[neo4j]
uri = "bolt://localhost:7687"
# auth is set via environment: ND_NEO4J__AUTH='["neo4j","your_password"]'

[redis]
url = "redis://localhost:6379/0"

[llm]
embedding_provider = "openai"
embedding_model = "text-embedding-3-large"

[llm.providers.openai]
provider = "openai"
model = "gpt-4o"
api_key = "sk-your-api-key"
base_url = "https://api.openai.com/v1"
rpm_limit = 60
concurrency = 5
timeout = 30.0

# Add more providers as needed:
# [llm.providers.deepseek]
# provider = "deepseek"
# model = "deepseek-chat"
# api_key = "sk-your-deepseek-key"
# base_url = "https://api.deepseek.com/v1"
# rpm_limit = 30
# concurrency = 3
# timeout = 30.0

[llm.call_points.classifier]
primary = "openai"
fallbacks = []

[llm.call_points.cleaner]
primary = "openai"
fallbacks = []

[llm.call_points.categorizer]
primary = "openai"
fallbacks = []

[llm.call_points.merger]
primary = "openai"
fallbacks = []

[llm.call_points.analyze]
primary = "openai"
fallbacks = []

[llm.call_points.credibility_checker]
primary = "openai"
fallbacks = []

[llm.call_points.entity_extractor]
primary = "openai"
fallbacks = []

[llm.call_points.entity_resolver]
primary = "openai"
fallbacks = []

[fetcher]
playwright_pool_size = 5
default_per_host_concurrency = 2
global_max_concurrency = 32
httpx_timeout = 15.0
user_agent = "Mozilla/5.0 (compatible; NewsBot/1.0)"

[prompt]
dir = "config/prompts"

[api]
api_key = "your-secure-api-key"
rate_limit = "100/minute"
host = "0.0.0.0"
port = 8000

[scheduler]
crawl_interval_minutes = 30
neo4j_retry_interval_minutes = 10
retry_flush_interval_seconds = 30
