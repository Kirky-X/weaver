version: "3.8"

name: weaver

x-common-config: &common-config
  restart: unless-stopped
  networks:
    - weaver_network

services:
  postgres:
    image: postgres:16-alpine
    container_name: weaver_postgres
    <<: *common-config
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: weaver
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d weaver"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  neo4j:
    image: neo4j:5.25
    container_name: weaver_neo4j
    <<: *common-config
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2g
      NEO4J_dbms_memory_pagecache_size: 1g
      NEO4J_dbms_tx__log_rotation_retention__policy: false
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 1m

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      cache_from:
        - weaver_app:latest
    image: weaver_app:latest
    container_name: weaver_app
    <<: *common-config
    environment:
      WEAVER_POSTGRES__DSN: "postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/weaver"
      WEAVER_NEO4J__URI: "bolt://neo4j:7687"
      WEAVER_NEO4J__AUTH: '["neo4j","${NEO4J_PASSWORD}"]'
      WEAVER_REDIS__URL: "redis://redis:6379/0"
      WEAVER_API__API_KEY: ${WEAVER_API__API_KEY:?WEAVER_API__API_KEY is required}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ../src/config:/app/src/config:ro
      - app_logs:/app/logs

  redis:
    image: redis:7.2-alpine
    container_name: weaver_redis
    <<: *common-config
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  postgres_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  neo4j_import:
    driver: local
  redis_data:
    driver: local
  app_logs:
    driver: local

networks:
  weaver_network:
    driver: bridge
