version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: news_discovery_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: news_discovery
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - news_discovery_network

  neo4j:
    image: neo4j:5.25
    container_name: news_discovery_neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-newpassword123}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2g
      NEO4J_dbms_memory_pagecache_size: 1g
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - news_discovery_network

  redis:
    image: redis:7-alpine
    container_name: news_discovery_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - news_discovery_network

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: news_discovery_app
    environment:
      ND_POSTGRES__DSN: "postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/news_discovery"
      ND_NEO4J__URI: "bolt://neo4j:7687"
      ND_NEO4J__AUTH: '["neo4j","${NEO4J_PASSWORD:-newpassword123}"]'
      ND_REDIS__URL: "redis://redis:6379/0"
      ND_API__API_KEY: ${API_KEY:-dev-api-key}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    volumes:
      - ../src/config:/app/src/config:ro
    networks:
      - news_discovery_network

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  redis_data:

networks:
  news_discovery_network:
    driver: bridge
