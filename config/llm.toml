# LLM Configuration
# This file defines LLM providers, models, and routing rules.

# -----------------------------------------------------------------------------
# Global Settings
# -----------------------------------------------------------------------------

[global]
default_chat_provider = "aiping"
default_embedding_provider = "aiping_embedding"
default_rerank_provider = "aiping_rerank"

# Circuit breaker settings
circuit_breaker_threshold = 5      # Number of failures before opening
circuit_breaker_timeout = 60.0     # Seconds before transitioning to half-open

# Default timeout for LLM calls
default_timeout = 120.0

# -----------------------------------------------------------------------------
# Provider Definitions
# -----------------------------------------------------------------------------

# Claude via CC-Stitch (Anthropic)
[providers.cc_stitch]
type = "anthropic"
model = "claude-sonnet-4-20250514"
api_key = "${ANTHROPIC_API_KEY}"
base_url = "http://127.0.0.1:5000"
rpm_limit = 0           # 0 = unlimited
concurrency = 3
timeout = 300.0
priority = 10           # Lower = higher priority
weight = 100
capabilities = ["chat", "vision", "streaming"]

# Zhipu AI (OpenAI-compatible)
[providers.zhipu]
type = "openai"
model = "glm-4.7-flash"
api_key = "${ZHIPU_API_KEY}"
base_url = "https://open.bigmodel.cn/api/paas/v4"
rpm_limit = 30
concurrency = 1
timeout = 120.0
priority = 30
weight = 60
capabilities = ["chat", "streaming"]

# Ollama local embedding
[providers.embedding]
type = "embedding"
model = "qwen3-embedding:0.6b"
api_key = "ollama"
base_url = "http://localhost:11434"
rpm_limit = 0
concurrency = 3
timeout = 60.0
priority = 10
weight = 100
capabilities = ["embedding"]

# OpenAI GPT-4
[providers.openai]
type = "openai"
model = "gpt-4o"
api_key = "${OPENAI_API_KEY}"
base_url = "https://api.openai.com/v1"
rpm_limit = 60
concurrency = 5
timeout = 120.0
priority = 50
weight = 100
capabilities = ["chat", "embedding", "function_calling", "streaming", "vision"]

# Jina Rerank
[providers.jina]
type = "rerank"
model = "jina-reranker-v2"
api_key = "${JINA_API_KEY}"
base_url = "https://api.jina.ai/v1"
rpm_limit = 60
concurrency = 5
timeout = 30.0
priority = 10
weight = 100
capabilities = ["rerank"]

# aiping AI Chat (OpenAI-compatible, GLM-4-9B-0414)
[providers.aiping]
type = "openai"
model = "GLM-4-9B-0414"
api_key = "${AIPING_API_KEY}"
base_url = "https://www.aiping.cn/api/v1"
rpm_limit = 100
concurrency = 3
timeout = 120.0
priority = 10
weight = 100
capabilities = ["chat", "streaming"]

# aiping AI Embedding (OpenAI-compatible, Qwen3-Embedding-0.6B)
[providers.aiping_embedding]
type = "embedding"
model = "Qwen3-Embedding-0.6B"
api_key = "${AIPING_API_KEY}"
base_url = "https://www.aiping.cn/api/v1"
rpm_limit = 100
concurrency = 3
timeout = 60.0
priority = 10
weight = 100
capabilities = ["embedding"]

# aiping AI Rerank (Custom REST API, Qwen3-Reranker-0.6B)
[providers.aiping_rerank]
type = "aiping_rerank"
model = "Qwen3-Reranker-0.6B"
api_key = "${AIPING_API_KEY}"
base_url = "https://www.aiping.cn/api/v1"
rpm_limit = 100
concurrency = 3
timeout = 30.0
priority = 10
weight = 100
capabilities = ["rerank"]

# -----------------------------------------------------------------------------
# Call Point Routing
# Uses label format: {type}.{provider}.{model}
# -----------------------------------------------------------------------------

[call-points.classifier]
primary = "chat.aiping.GLM-4-9B-0414"
fallbacks = [
    "chat.zhipu.glm-4.7-flash",
    "chat.cc_stitch.claude-sonnet-4-20250514",
]

[call-points.cleaner]
primary = "chat.aiping.GLM-4-9B-0414"
fallbacks = [
    "chat.zhipu.glm-4.7-flash",
    "chat.cc_stitch.claude-sonnet-4-20250514",
]

[call-points.categorizer]
primary = "chat.aiping.GLM-4-9B-0414"
fallbacks = [
    "chat.zhipu.glm-4.7-flash",
    "chat.cc_stitch.claude-sonnet-4-20250514",
]

[call-points.merger]
primary = "chat.aiping.GLM-4-9B-0414"
fallbacks = [
    "chat.zhipu.glm-4.7-flash",
    "chat.cc_stitch.claude-sonnet-4-20250514",
]

[call-points.analyze]
primary = "chat.aiping.GLM-4-9B-0414"
fallbacks = [
    "chat.zhipu.glm-4.7-flash",
    "chat.cc_stitch.claude-sonnet-4-20250514",
]

[call-points.credibility_checker]
primary = "chat.aiping.GLM-4-9B-0414"
fallbacks = [
    "chat.zhipu.glm-4.7-flash",
    "chat.cc_stitch.claude-sonnet-4-20250514",
]

[call-points.quality_scorer]
primary = "chat.aiping.GLM-4-9B-0414"
fallbacks = [
    "chat.zhipu.glm-4.7-flash",
    "chat.cc_stitch.claude-sonnet-4-20250514",
]

[call-points.entity_extractor]
primary = "chat.aiping.GLM-4-9B-0414"
fallbacks = [
    "chat.zhipu.glm-4.7-flash",
    "chat.cc_stitch.claude-sonnet-4-20250514",
]

[call-points.entity_resolver]
primary = "chat.aiping.GLM-4-9B-0414"
fallbacks = [
    "chat.zhipu.glm-4.7-flash",
    "chat.cc_stitch.claude-sonnet-4-20250514",
]

[call-points.embedding]
primary = "embedding.embedding.qwen3-embedding:0.6b"
fallbacks = [
    "embedding.aiping_embedding.Qwen3-Embedding-0.6B",
]

[call-points.rerank]
primary = "rerank.aiping_rerank.Qwen3-Reranker-0.6B"
fallbacks = [
    "rerank.jina.jina-reranker-v2",
]

# -----------------------------------------------------------------------------
# Default Labels
# Used when no specific call point is configured
# -----------------------------------------------------------------------------

[defaults.chat]
label = "chat.aiping.GLM-4-9B-0414"
fallbacks = [
    "chat.zhipu.glm-4.7-flash",
    "chat.cc_stitch.claude-sonnet-4-20250514",
]

[defaults.embedding]
label = "embedding.aiping_embedding.Qwen3-Embedding-0.6B"
fallbacks = [
    "embedding.embedding.qwen3-embedding:0.6b",
]

[defaults.rerank]
label = "rerank.aiping_rerank.Qwen3-Reranker-0.6B"
fallbacks = [
    "rerank.jina.jina-reranker-v2",
]