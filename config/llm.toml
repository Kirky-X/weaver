[call-points.analyze]
primary = "chat.aiping.GLM-4-9B-0414"
fallbacks = ["chat.dmx.glm-4.7-free"]

[call-points.entity_extractor]
primary = "chat.aiping.GLM-4-9B-0414"
fallbacks = ["chat.dmx.glm-4.7-free"]

[call-points.credibility_checker]
primary = "chat.aiping.GLM-4-9B-0414"
fallbacks = ["chat.dmx.glm-4.7-free"]

[call-points.quality_scorer]
primary = "chat.aiping.GLM-4-9B-0414"
