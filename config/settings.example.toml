# Weaver Settings Configuration
#
# Copy this file to config/settings.toml and adjust values as needed.
# Environment variables take precedence over TOML values.

[postgres]
dsn = "postgresql+asyncpg://postgres:postgres@localhost:5432/weaver"

[neo4j]
uri = "bolt://localhost:7687"
user = "neo4j"
password = "neo4j_password"

[redis]
url = "redis://localhost:6379/0"

[llm]
embedding_provider = "ollama"
embedding_model = "qwen3-embedding:0.6b"

# Primary LLM provider
[llm.providers.primary]
provider = "openai"
model = "glm-4.7"
api_key = ""
base_url = "http://127.0.0.1:5000/v1"
timeout = 120.0

# Fallback LLM provider (local)
[llm.providers.ollama]
provider = "ollama"
model = "qwen3.5:9b"
api_key = ""
base_url = "http://localhost:11434"
timeout = 300.0

# LLM call points - all use ollama as primary with empty fallbacks
[llm.call_points]
classifier = { primary = "ollama", fallbacks = [] }
cleaner = { primary = "ollama", fallbacks = [] }
categorizer = { primary = "ollama", fallbacks = [] }
merger = { primary = "ollama", fallbacks = [] }
analyze = { primary = "ollama", fallbacks = [] }
entity_extractor = { primary = "ollama", fallbacks = [] }
entity_resolver = { primary = "ollama", fallbacks = [] }
search_local = { primary = "ollama", fallbacks = [] }
search_global = { primary = "ollama", fallbacks = [] }

[fetcher]
playwright_pool_size = 5
default_per_host_concurrency = 2
global_max_concurrency = 32
httpx_timeout = 15.0

[api]
api_key = "change-me-in-production"
rate_limit = "100/minute"
host = "0.0.0.0"
port = 8000

[scheduler]
crawl_interval_minutes = 30

[search]
hybrid_enabled = true
rerank_enabled = true
