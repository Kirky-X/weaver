# LLM Provider Configuration Template
# ============================================================
# Two-layer nested configuration: Provider (厂商) + Model (模型)
# Copy this file to config/llm.toml and configure your providers.
# API keys must use environment variable reference: ${ENV_VAR}
# ============================================================

# ============================================================
# Global Settings
# ============================================================
[global]
circuit_breaker_threshold = 5       # Consecutive failures before opening circuit
circuit_breaker_timeout = 60.0      # Cooldown period before half-open (seconds)
default_timeout = 120.0             # Default timeout for all LLM calls (seconds)

# ============================================================
# Provider: OpenAI
# ============================================================
[providers.openai]
type = "openai"                     # LiteLLM provider type
base_url = "https://api.openai.com/v1"
api_key = "${OPENAI_API_KEY}"       # Environment variable reference
rpm_limit = 500
concurrency = 10
timeout = 120.0
priority = 100
weight = 100

  [providers.openai.models.chat]
  model_id = "gpt-4o"
  temperature = 0.0
  max_tokens = 4096
  capabilities = ["chat", "vision"]

  [providers.openai.models.embedding]
  model_id = "text-embedding-3-large"
  capabilities = ["embedding"]

# ============================================================
# Provider: Anthropic
# ============================================================
[providers.anthropic]
type = "anthropic"
base_url = ""                       # Use official endpoint
api_key = "${ANTHROPIC_API_KEY}"
rpm_limit = 60
concurrency = 5
timeout = 300.0
priority = 100
weight = 100

  [providers.anthropic.models.chat]
  model_id = "claude-sonnet-4-20250514"
  temperature = 0.0
  max_tokens = 4096
  capabilities = ["chat", "vision"]

# ============================================================
# Provider: Ollama (Local)
# ============================================================
[providers.ollama]
type = "openai"
base_url = "http://localhost:11434/v1"
api_key = "ollama"                  # Ollama doesn't require a real key
rpm_limit = 0                       # No rate limit for local
concurrency = 3
timeout = 300.0
priority = 200                      # Lower priority (higher number)
weight = 50

  [providers.ollama.models.chat]
  model_id = "qwen3.5:9b"
  temperature = 0.0
  max_tokens = 4096
  capabilities = ["chat"]

# ============================================================
# Provider: aiping.cn (OpenAI-compatible)
# ============================================================
[providers.aiping]
type = "openai"                     # Use openai type for OpenAI-compatible APIs
base_url = "https://www.aiping.cn/api/v1"
api_key = "${AIPING_API_KEY}"
rpm_limit = 100
concurrency = 8
timeout = 300.0
priority = 100
weight = 100

  [providers.aiping.models.chat]
  model_id = "GLM-4-9B-0414"
  temperature = 0.0
  max_tokens = 4096
  capabilities = ["chat"]

  [providers.aiping.models.embedding]
  model_id = "Qwen3-Embedding-0.6B"
  capabilities = ["embedding"]

  [providers.aiping.models.rerank]
  model_id = "Qwen3-Reranker-0.6B"
  capabilities = ["rerank"]

# ============================================================
# Default Labels (used when no call point specified)
# ============================================================
[defaults.chat]
label = "chat.openai.gpt-4o"
fallbacks = ["chat.anthropic.claude-sonnet-4-20250514"]

[defaults.embedding]
label = "embedding.openai.text-embedding-3-large"
fallbacks = []

[defaults.rerank]
label = "rerank.aiping.Qwen3-Reranker-0.6B"
fallbacks = []

# ============================================================
# Call Point Routing (task-specific provider selection)
# Label format: {type}.{provider}.{model_id}
# ============================================================
[call-points.classifier]
primary = "chat.openai.gpt-4o"
fallbacks = []

[call-points.cleaner]
primary = "chat.openai.gpt-4o"
fallbacks = []

[call-points.entity_extractor]
primary = "chat.openai.gpt-4o"
fallbacks = []

[call-points.embedding]
primary = "embedding.openai.text-embedding-3-large"
fallbacks = []

[call-points.rerank]
primary = "rerank.aiping.Qwen3-Reranker-0.6B"
fallbacks = []