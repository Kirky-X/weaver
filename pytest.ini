# Pytest configuration for enhanced test quality monitoring.
#
# This file provides standardized test configuration across all test directories.
# Individual conftest.py files may override or extend these settings.

[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = src

# Async support
asyncio_mode = auto

# Default coverage options (can be overridden with --cov flags)
addopts =
    --strict-markers
    --tb=short
    -ra
    --color=yes
    --strict-config
    --cov-fail-under=80
    -m "not integration and not e2e"

# Warning filters
filterwarnings =
    # Torch/CUDA warnings
    ignore:The pynvml package is deprecated:FutureWarning:torch.cuda
    ignore:Can't initialize NVML:UserWarning:torch.cuda
    ignore:`torch.jit.script` is deprecated:DeprecationWarning:torch.jit
    # Playwright warnings
    ignore:Stealth has already been applied:UserWarning:playwright_stealth
    # Async/coroutine warnings
    ignore:coroutine.*was never awaited:RuntimeWarning
    # SciPy deprecation
    ignore:Please import.*from.*scipy.sparse:DeprecationWarning:scipy.sparse.construct
    ignore:Please import.*from.*scipy.sparse:DeprecationWarning:hyppo
    # Numba deprecation
    ignore:The keyword argument.*nopython.*:DeprecationWarning:numba
    # Swig builtin types (from spaCy/torch)
    ignore:builtin type.*has no __module__:DeprecationWarning

# Coverage configuration
[coverage:run]
source = src
branch = true
omit =
    */tests/*
    */__pycache__/*
    */.venv/*
    */alembic/*
    */scripts/*
    */temp/*

[coverage:report]
precision = 2
show_missing = true
skip_covered = false
fail_under = 75
exclude_lines =
    pragma: no cover
    def __repr__
    def __str__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    if typing.TYPE_CHECKING:
    @abstractmethod

# Coverage thresholds by module
# BM25IndexService: 80% threshold (new module)
# Search enhancement modules: 75% threshold
# Legacy modules (global_search, local_search): excluded from strict thresholds
[coverage:paths]
source =
    src/

[coverage:html]
directory = htmlcov

[coverage:xml]
output = coverage.xml
